# RAG Configuration
retrieval:
  top_k: 20              # Number of chunks to retrieve before reranking
  rerank_top_n: 5        # Number of chunks to keep after reranking
  rerank_enabled: true   # Enable Voyage rerank-2.5
  bm25_weight: 0.4       # EnsembleRetriever weight for BM25 (keyword) retriever
  vector_weight: 0.6     # EnsembleRetriever weight for dense vector retriever
  rerank_query_expansion: false  # Enrich rerank query with HKEX domain synonyms

# Chunking (token-aware, cl100k_base). Re-ingest after changing these.
chunking:
  chunk_size: 512        # Target chunk size in tokens
  chunk_overlap: 64      # Overlap between adjacent chunks in tokens

# Models
models:
  embedding: voyage-finance-2
  rerank: rerank-2.5
  llm: claude-sonnet-4-6

# Vector Store
vector_store:
  persist_directory: data/chroma_db
  collection_name: exchange_docs

# Staleness Detection
staleness:
  days: 60  # Warn if source doc ingested more than N days ago

# API
api:
  host: 0.0.0.0
  port: 8000

# UI
ui:
  host: localhost
  port: 8501
